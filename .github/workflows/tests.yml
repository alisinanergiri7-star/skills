name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate-skills:
    name: Validate all SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yaml dependency
        run: pip install pyyaml

      - name: Validate all skills
        run: |
          failed=0
          for skill_dir in skills/*/; do
            python skills/skill-creator/scripts/quick_validate.py "$skill_dir" || failed=1
          done
          exit $failed

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
